version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: workflow_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: chita@1992
      POSTGRES_DB: workflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d workflow_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: workflow_backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=chita@1992
      - DB_NAME=workflow_db
      - DB_SSLMODE=disable
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET:-super-secret-approval-workflow-key-2026}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: workflow_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
