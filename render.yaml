databases:
  - name: smartflow-db
    databaseName: smartflow_db
    plan: free

services:
  - type: web
    name: smartflow-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: DB_SSLMODE
        value: require
      - key: DATABASE_URL
        fromDatabase:
          name: smartflow-db
          property: connectionString

  - type: static
    name: smartflow-frontend
    env: node
    plan: free
    rootDirectory: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          name: smartflow-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
